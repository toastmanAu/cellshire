<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>cellshire tests</title>
    <style>
        body { font-family: ui-monospace, monospace; padding: 24px;
               background: #0d1117; color: #e6edf3; }
        h1 { color: #f0f6fc; margin-top: 0; }
        .pass { color: #3fb950; }
        .fail { color: #f85149; }
        .summary { margin: 16px 0 24px; font-size: 1.2em; }
        .case { margin: 2px 0; }
        pre { background: #161b22; padding: 10px 14px; border-radius: 4px;
              overflow-x: auto; border-left: 3px solid #f85149; }
    </style>
</head>
<body>
    <h1>cellshire tests</h1>
    <div id="results"></div>

    <script type="module">
        import { runAll } from './src/test/harness.js';
        // Test imports — keep alphabetised, one per line.
        import './src/assets/openAssetStandard.test.js';
        import './src/bank/bankLoans.test.js';
        import './src/characters/catalog.test.js';
        import './src/chain/cccJoyId.test.js';
        import './src/chain/epochModifier.test.js';
        import './src/chain/epochSeed.test.js';
        import './src/chain/epochStatus.test.js';
        import './src/chain/miningTx.test.js';
        import './src/chain/propertySnapshotTx.test.js';
        import './src/core/Player.test.js';
        import './src/core/mining-dispatch.test.js';
        import './src/farm/farmState.test.js';
        import './src/farm/farmZone.test.js';
        import './src/grid/walkability.test.js';
        import './src/inventory/inventoryAdapter.test.js';
        import './src/lib/safeStorage.test.js';
        import './src/maps/mapRegistry.test.js';
        import './src/mining/cryptoEconomy.test.js';
        import './src/mining/epochValueRange.test.js';
        import './src/mining/miningAdapter.test.js';
        import './src/mining/minedStore.test.js';
        import './src/mining/oreCatalog.test.js';
        import './src/mining/oreIdentity.test.js';
        import './src/mining/priceSnapshot.test.js';
        import './src/marketplace/playerMarketplace.test.js';
        import './src/property/propertyExpansion.test.js';
        import './src/property/propertyOwnerBinding.test.js';
        import './src/property/propInventory.test.js';
        import './src/property/propertySnapshotAdapter.test.js';
        import './src/property/propertySnapshotWriter.test.js';
        import './src/property/propertyStore.test.js';
        import './src/property/propertyZone.test.js';
        import './src/resources/harvestCatalog.test.js';
        import './src/resources/resourceInventory.test.js';
        import './src/store/generalStoreCatalog.test.js';
        import './src/test/sanity.test.js';
        import './src/trader/traderAdapter.test.js';
        import './src/trader/traderRates.test.js';
        import './src/treasury/houseTreasury.test.js';
        import './src/township/townshipZone.test.js';
        import './src/ui/BuildingInteriorHUD.test.js';
        import './src/ui/CharacterPicker.test.js';
        import './src/ui/cursors.test.js';
        import './src/ui/EconomyHUD.test.js';
        import './src/ui/OreDebugHUD.test.js';
        import './src/ui/ResourceHUD.test.js';
        import './src/ui/WalletHUD.test.js';
        import './src/visiting/propertyVisit.test.js';
        import './src/visiting/visitLinks.test.js';
        import './src/wallet/walletIdentity.test.js';
        import './src/worldgen/procgen.test.js';

        const out = document.getElementById('results');
        const results = await runAll();
        const passed = results.filter(r => r.ok).length;
        const failed = results.length - passed;

        const summary = document.createElement('div');
        summary.className = 'summary ' + (failed === 0 ? 'pass' : 'fail');
        summary.textContent = `${passed} passed, ${failed} failed`;
        out.appendChild(summary);

        for (const r of results) {
            const line = document.createElement('div');
            line.className = 'case ' + (r.ok ? 'pass' : 'fail');
            line.textContent = `${r.ok ? 'PASS' : 'FAIL'}  ${r.describe || ''} > ${r.name}`;
            out.appendChild(line);
            if (!r.ok) {
                const pre = document.createElement('pre');
                pre.textContent = r.err.stack || String(r.err);
                out.appendChild(pre);
            }
        }

        console.log(`tests: ${passed} passed, ${failed} failed`);
        for (const r of results.filter(x => !x.ok)) {
            console.error(r.describe, '>', r.name, '\n', r.err);
        }
    </script>
</body>
</html>
